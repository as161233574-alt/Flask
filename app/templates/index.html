<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flask 用户系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #4f46e5;
      --primary-h: #4338ca;
      --danger:    #ef4444;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --bg:        #f1f5f9;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      background: var(--primary);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
    nav .nav-right { display: flex; align-items: center; gap: 12px; }
    nav .badge {
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .8rem;
    }
    nav .badge.admin { background: #fbbf24; color: #1e293b; }
    #btn-logout {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      transition: background .2s;
    }
    #btn-logout:hover { background: rgba(255,255,255,.25); }

    /* ── Layout ── */
    main {
      max-width: 880px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-body { padding: 24px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .9rem;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: .85rem; font-weight: 500; color: var(--muted); }
    input[type=text], input[type=email], input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 7px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary  { background: var(--primary);  color: #fff; }
    .btn-primary:hover  { background: var(--primary-h); }
    .btn-danger   { background: var(--danger);   color: #fff; }
    .btn-danger:hover   { background: #dc2626; }
    .btn-success  { background: var(--success);  color: #fff; }
    .btn-warning  { background: var(--warning);  color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: .8rem; }
    .btn-full { width: 100%; justify-content: center; padding: 11px; }

    /* ── Alert ── */
    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: .88rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    /* ── Profile info ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .info-item label { font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .info-item .val { font-size: 1rem; font-weight: 500; }
    .info-item .val.admin-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: .85rem;
    }
    .info-item .val.user-badge {
      display: inline-block;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: .85rem;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { background: #f8fafc; padding: 10px 14px; text-align: left; font-weight: 600; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid var(--border); }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    /* ── Role select ── */
    select {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: .85rem;
      cursor: pointer;
    }

    /* ── Auth page layout ── */
    #auth-section {
      max-width: 420px;
      margin: 0 auto;
    }
    #auth-section .card-header { justify-content: center; font-size: 1.1rem; }

    /* ── Section visibility ── */
    .hidden { display: none !important; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats bar ── */
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-card .lbl { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    @media (max-width: 500px) {
      .card-body { padding: 16px; }
      nav { padding: 0 14px; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <span class="brand">🔐 Flask 用户系统</span>
  <div class="nav-right" id="nav-user" style="display:none">
    <span class="badge" id="nav-username"></span>
    <span class="badge admin hidden" id="nav-role">管理员</span>
    <button class="btn" id="btn-logout">退出</button>
  </div>
</nav>

<main>

  <!-- ═══════════════ AUTH SECTION ═══════════════ -->
  <div id="auth-section">
    <div class="card">
      <div class="card-header">欢迎登录</div>
      <div class="card-body">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchAuth('login')">登录</button>
          <button class="tab-btn"        onclick="switchAuth('register')">注册</button>
        </div>

        <!-- Login Form -->
        <div id="login-panel">
          <div class="alert alert-error"   id="login-err"></div>
          <div class="alert alert-success" id="login-ok"></div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="login-email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-pwd" placeholder="至少6位">
          </div>
          <button class="btn btn-primary btn-full" onclick="doLogin()">登录</button>
          <p style="text-align:center;margin-top:14px;font-size:.85rem;color:var(--muted)">
            还没有账号？<a href="#" onclick="switchAuth('register')" style="color:var(--primary)">立即注册</a>
          </p>
        </div>

        <!-- Register Form -->
        <div id="register-panel" class="hidden">
          <div class="alert alert-error"   id="reg-err"></div>
          <div class="alert alert-success" id="reg-ok"></div>
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="reg-username" placeholder="3~20个字符">
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="reg-email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="reg-pwd" placeholder="至少6位">
          </div>
          <button class="btn btn-primary btn-full" onclick="doRegister()">注册</button>
          <p style="text-align:center;margin-top:14px;font-size:.85rem;color:var(--muted)">
            已有账号？<a href="#" onclick="switchAuth('login')" style="color:var(--primary)">去登录</a>
          </p>
        </div>

      </div>
    </div>
  </div><!-- /auth-section -->

  <!-- ═══════════════ DASHBOARD ═══════════════ -->
  <div id="dashboard" class="hidden">

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('profile')">👤 个人信息</button>
      <button class="tab-btn"        onclick="switchTab('password')">🔑 修改密码</button>
      <button class="tab-btn hidden" onclick="switchTab('admin')" id="tab-admin">🛡️ 用户管理</button>
    </div>

    <!-- ─── Profile ─── -->
    <div id="panel-profile">
      <div class="card">
        <div class="card-header">个人信息</div>
        <div class="card-body">
          <div class="alert alert-error"   id="profile-err"></div>
          <div class="alert alert-success" id="profile-ok"></div>
          <div class="info-grid" id="profile-info"></div>
          <div class="divider"></div>
          <p style="font-size:.85rem;color:var(--muted);margin-bottom:12px">修改资料</p>
          <div class="form-group">
            <label>新用户名</label>
            <input type="text" id="edit-username" placeholder="留空则不修改">
          </div>
          <div class="form-group">
            <label>新邮箱</label>
            <input type="email" id="edit-email" placeholder="留空则不修改">
          </div>
          <button class="btn btn-primary" onclick="doUpdateProfile()">保存修改</button>
        </div>
      </div>
    </div>

    <!-- ─── Password ─── -->
    <div id="panel-password" class="hidden">
      <div class="card">
        <div class="card-header">修改密码</div>
        <div class="card-body" style="max-width:400px">
          <div class="alert alert-error"   id="pwd-err"></div>
          <div class="alert alert-success" id="pwd-ok"></div>
          <div class="form-group">
            <label>当前密码</label>
            <input type="password" id="cur-pwd" placeholder="输入当前密码">
          </div>
          <div class="form-group">
            <label>新密码</label>
            <input type="password" id="new-pwd" placeholder="至少6位">
          </div>
          <div class="form-group">
            <label>确认新密码</label>
            <input type="password" id="confirm-pwd" placeholder="再次输入新密码">
          </div>
          <button class="btn btn-primary" onclick="doChangePassword()">更新密码</button>
        </div>
      </div>
    </div>

    <!-- ─── Admin ─── -->
    <div id="panel-admin" class="hidden">
      <div class="stats" id="admin-stats"></div>
      <div class="card">
        <div class="card-header">
          🛡️ 用户管理
          <button class="btn btn-sm btn-primary" onclick="loadUsers()" style="margin-left:auto">刷新</button>
        </div>
        <div class="card-body" style="padding:0">
          <div class="alert alert-error"   id="admin-err" style="margin:16px 16px 0"></div>
          <div class="alert alert-success" id="admin-ok"  style="margin:16px 16px 0"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>用户名</th>
                  <th>邮箱</th>
                  <th>角色</th>
                  <th>注册时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /dashboard -->
</main>

<script>
  const API = '';
  let accessToken  = localStorage.getItem('access_token')  || '';
  let refreshToken = localStorage.getItem('refresh_token') || '';
  let currentUser  = null;

  /* ─────────────────── API helper ─────────────────── */
  async function api(method, path, body, useRefresh = false) {
    const token = useRefresh ? refreshToken : accessToken;
    const opts  = {
      method,
      headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) }
    };
    if (body) opts.body = JSON.stringify(body);
    const res  = await fetch(API + path, opts);
    const json = await res.json();
    return { ok: res.ok, status: res.status, data: json };
  }

  /* ─────────────────── Alerts ─────────────────── */
  function showAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  /* ─────────────────── Auth switching ─────────────────── */
  function switchAuth(tab) {
    const isLogin = tab === 'login';
    document.getElementById('login-panel').classList.toggle('hidden', !isLogin);
    document.getElementById('register-panel').classList.toggle('hidden', isLogin);
    document.querySelectorAll('#auth-section .tab-btn').forEach((b, i) => b.classList.toggle('active', i === (isLogin ? 0 : 1)));
  }

  function switchTab(tab) {
    ['profile','password','admin'].forEach(t => {
      document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    });
    document.querySelectorAll('#dashboard > .tabs .tab-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('onclick').includes(tab));
    });
    if (tab === 'admin') loadUsers();
  }

  /* ─────────────────── Register ─────────────────── */
  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pwd').value;
    if (!username || !email || !password) { showAlert('reg-err','请填写所有字段'); return; }
    const r = await api('POST', '/auth/register', { username, email, password });
    if (r.ok) {
      showAlert('reg-ok', `注册成功！欢迎 ${r.data.data.username}，请登录`, 'success');
      document.getElementById('reg-username').value = '';
      document.getElementById('reg-email').value    = email;
      document.getElementById('reg-pwd').value      = '';
      setTimeout(() => switchAuth('login'), 1200);
    } else {
      showAlert('reg-err', r.data.error || '注册失败');
    }
  }

  /* ─────────────────── Login ─────────────────── */
  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pwd').value;
    if (!email || !password) { showAlert('login-err','请填写邮箱和密码'); return; }
    const r = await api('POST', '/auth/login', { email, password });
    if (r.ok) {
      accessToken  = r.data.data.access_token;
      refreshToken = r.data.data.refresh_token;
      localStorage.setItem('access_token',  accessToken);
      localStorage.setItem('refresh_token', refreshToken);
      await loadMe();
      showDashboard();
    } else {
      showAlert('login-err', r.data.error || '登录失败');
    }
  }

  /* ─────────────────── Logout ─────────────────── */
  document.getElementById('btn-logout').addEventListener('click', async () => {
    await api('POST', '/auth/logout');
    accessToken = refreshToken = '';
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    currentUser = null;
    showAuthSection();
  });

  /* ─────────────────── Load current user ─────────────────── */
  async function loadMe() {
    const r = await api('GET', '/users/me');
    if (r.ok) {
      currentUser = r.data.data;
      renderProfile();
      // Nav
      document.getElementById('nav-username').textContent = currentUser.username;
      const roleBadge = document.getElementById('nav-role');
      roleBadge.classList.toggle('hidden', currentUser.role !== 'admin');
      document.getElementById('tab-admin').classList.toggle('hidden', currentUser.role !== 'admin');
      document.getElementById('nav-user').style.display = 'flex';
    }
  }

  /* ─────────────────── Render profile info ─────────────────── */
  function renderProfile() {
    const u   = currentUser;
    const fmt = d => new Date(d).toLocaleString('zh-CN');
    const roleCls = u.role === 'admin' ? 'admin-badge' : 'user-badge';
    const roleTxt = u.role === 'admin' ? '管理员' : '普通用户';
    document.getElementById('profile-info').innerHTML = `
      <div class="info-item"><label>用户ID</label><div class="val">#${u.id}</div></div>
      <div class="info-item"><label>用户名</label><div class="val">${u.username}</div></div>
      <div class="info-item"><label>邮箱</label><div class="val">${u.email}</div></div>
      <div class="info-item"><label>角色</label><div class="val"><span class="${roleCls}">${roleTxt}</span></div></div>
      <div class="info-item"><label>注册时间</label><div class="val">${fmt(u.created_at)}</div></div>
    `;
  }

  /* ─────────────────── Update profile ─────────────────── */
  async function doUpdateProfile() {
    const body = {};
    const u = document.getElementById('edit-username').value.trim();
    const e = document.getElementById('edit-email').value.trim();
    if (u) body.username = u;
    if (e) body.email    = e;
    if (!u && !e) { showAlert('profile-err','请至少填写一个修改项'); return; }
    const r = await api('PUT', '/users/me', body);
    if (r.ok) {
      currentUser = r.data.data;
      renderProfile();
      document.getElementById('nav-username').textContent = currentUser.username;
      document.getElementById('edit-username').value = '';
      document.getElementById('edit-email').value    = '';
      showAlert('profile-ok', '资料已更新', 'success');
    } else {
      showAlert('profile-err', r.data.error || '更新失败');
    }
  }

  /* ─────────────────── Change password ─────────────────── */
  async function doChangePassword() {
    const cur     = document.getElementById('cur-pwd').value;
    const newp    = document.getElementById('new-pwd').value;
    const confirm = document.getElementById('confirm-pwd').value;
    if (!cur || !newp || !confirm) { showAlert('pwd-err','请填写所有密码字段'); return; }
    if (newp !== confirm)           { showAlert('pwd-err','两次输入的新密码不一致'); return; }
    const r = await api('PUT', '/users/me/password', { current_password: cur, new_password: newp });
    if (r.ok) {
      showAlert('pwd-ok', '密码已更新，下次登录请使用新密码', 'success');
      ['cur-pwd','new-pwd','confirm-pwd'].forEach(id => document.getElementById(id).value = '');
    } else {
      showAlert('pwd-err', r.data.error || '修改失败');
    }
  }

  /* ─────────────────── Admin: load users ─────────────────── */
  async function loadUsers() {
    const r = await api('GET', '/users/');
    if (!r.ok) { showAlert('admin-err', r.data.error || '加载失败'); return; }
    const users = r.data.data;

    // Stats
    const total  = users.length;
    const admins = users.filter(u => u.role === 'admin').length;
    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">总用户</div></div>
      <div class="stat-card"><div class="num">${admins}</div><div class="lbl">管理员</div></div>
      <div class="stat-card"><div class="num">${total - admins}</div><div class="lbl">普通用户</div></div>
    `;

    const fmt = d => new Date(d).toLocaleDateString('zh-CN');
    document.getElementById('users-tbody').innerHTML = users.map(u => `
      <tr>
        <td style="color:var(--muted)">#${u.id}</td>
        <td style="font-weight:500">${u.username}${u.id === currentUser.id ? ' <span style="font-size:.75rem;color:var(--primary)">(我)</span>' : ''}</td>
        <td style="color:var(--muted)">${u.email}</td>
        <td>
          <select onchange="changeRole(${u.id}, this.value)" ${u.id === currentUser.id ? 'disabled title="不能修改自己的角色"' : ''}>
            <option value="user"  ${u.role === 'user'  ? 'selected' : ''}>普通用户</option>
            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>管理员</option>
          </select>
        </td>
        <td style="color:var(--muted)">${fmt(u.created_at)}</td>
        <td>
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${u.role === 'admin' ? '#f59e0b' : '#22c55e'};margin-right:4px"></span>
          ${u.role === 'admin' ? '管理员' : '普通用户'}
        </td>
      </tr>
    `).join('');
  }

  async function changeRole(userId, role) {
    const r = await api('PUT', `/users/${userId}/role`, { role });
    if (r.ok) {
      showAlert('admin-ok', `已将用户 #${userId} 的角色改为【${role === 'admin' ? '管理员' : '普通用户'}】`, 'success');
      loadUsers();
    } else {
      showAlert('admin-err', r.data.error || '操作失败');
      loadUsers();
    }
  }

  /* ─────────────────── Show/hide sections ─────────────────── */
  function showDashboard() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    switchTab('profile');
  }

  function showAuthSection() {
    document.getElementById('auth-section').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('nav-user').style.display = 'none';
    switchAuth('login');
  }

  /* ─────────────────── Enter key support ─────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('login-panel').classList.contains('hidden') &&
        !document.getElementById('auth-section').classList.contains('hidden')) doLogin();
    else if (!document.getElementById('register-panel').classList.contains('hidden') &&
             !document.getElementById('auth-section').classList.contains('hidden')) doRegister();
  });

  /* ─────────────────── Init ─────────────────── */
  (async function init() {
    if (accessToken) {
      const r = await api('GET', '/users/me');
      if (r.ok) {
        currentUser = r.data.data;
        renderProfile();
        document.getElementById('nav-username').textContent = currentUser.username;
        document.getElementById('nav-role').classList.toggle('hidden', currentUser.role !== 'admin');
        document.getElementById('tab-admin').classList.toggle('hidden', currentUser.role !== 'admin');
        document.getElementById('nav-user').style.display = 'flex';
        showDashboard();
        return;
      }
    }
    showAuthSection();
  })();
</script>
</body>
</html>
